[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"

solc = "0.8.20"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
celo = "${CELO_RPC_URL}"    # e.g. https://forno.celo.org

[etherscan]
celo = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }
